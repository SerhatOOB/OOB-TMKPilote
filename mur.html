function buildComColors(){ const ter=[], vad=[], seen={}; Object.keys(configs).forEach(function(k){ const cm=configs[k]&&configs[k].commerciaux; if(Array.isArray(cm)) cm.forEach(function(c){ if(c&&c.nom && !seen[c.nom]){ seen[c.nom]=1; (c.vad?vad:ter).push(c.nom); } }); }); ter.sort(); vad.sort(); const WARM=['#FF6B1A','#FF9F0A','#E8590C','#FB923C','#D9480F','#F59E0B','#EA580C','#FFB061','#C2410C','#F97316']; const COOL=['#0A84FF','#5AC8FA','#5E5CE6','#34C759','#06B6D4','#6366F1','#0EA5E9','#2DD4BF','#3B82F6','#8B5CF6']; const map={}; ter.forEach(function(n,i){ map[n]={color:WARM[i%WARM.length], vad:false}; }); vad.forEach(function(n,i){ map[n]={color:COOL[i%COOL.length], vad:true}; }); return map; }
function renderWall(){
  if(!document.body.classList.contains('wall')) return;
  const mk=wallViewMK;
  const data=agentList().map(computeAgent).sort((a,b)=>b.month.done-a.month.done); wallData=data;
  const totDone=data.reduce((a,x)=>a+x.month.done,0), totObj=data.reduce((a,x)=>a+x.month.obj,0);
  const totProj=data.reduce((a,x)=>a+x.month.proj,0), totToday=data.reduce((a,x)=>a+x.r1Today,0), totCalls=data.reduce((a,x)=>a+x.callsToday,0);
  const totUpcoming=data.reduce((a,x)=>a+(x.month.upcoming||0),0), totHonored=data.reduce((a,x)=>a+(x.month.honored||0),0);
  const totVad=data.reduce((a,x)=>a+(x.month.vadDone||0),0), totVadObj=data.reduce((a,x)=>a+(x.month.vadObj||0),0);
  const totFp=data.reduce((a,x)=>a+((x.month.bonus&&x.month.bonus.fp)||0),0);
  const regPct=totObj>0?Math.min(100,Math.round(totDone/totObj*100)):0;
  const projCls=totUpcoming>0?'ok':'';
  const reste=Math.max(0,totObj-totDone); const wd=workingDays(mk);
  const cadence=wd.elapsed>0?(totHonored/wd.elapsed).toFixed(1):'0.0';
  const dailyNeed=wd.remaining>0?Math.max(1,Math.ceil(reste/wd.remaining)):0;
  const nmk=nextMK(nowMK()); const _vsN=wallVadSet(); const nextAvance=records.filter(r=>r.d && r.d.outcome==='R1TMK pris' && !_vsN[r.d.commercial] && r.d.context!=='VAD' && rdvMK(r.d)===nmk).length;
  const monthR1=records.filter(r=>r.d && r.d.outcome==='R1TMK pris' && rdvMK(r.d)===mk).map(r=>r.d);
  const _vs=wallVadSet(); const monthR1F=monthR1.filter(function(r){ return !_vs[r.commercial] && r.context!=='VAD'; });
  const ringCtx={'Conquête':0,'Valeur':0,'Full prospect':0}; monthR1F.forEach(function(r){ var _c=(r.context && ringCtx.hasOwnProperty(r.context))?r.context:'Conquête'; ringCtx[_c]++; });
  const scored=monthR1F.filter(r=>typeof r.score==='number' && r.score>0);
  const quality=scored.length?Math.round(scored.reduce((a,r)=>a+r.score,0)/scored.length):null;
  const comSet={};
  Object.keys(configs).forEach(k=>{ const cm=configs[k]&&configs[k].commerciaux; if(Array.isArray(cm)) cm.forEach(c=>{ if(c&&c.nom&&!_vs[c.nom]) comSet[c.nom]=(comSet[c.nom]||0); }); });
  monthR1F.forEach(r=>{ if(r.commercial){ if(!comSet.hasOwnProperty(r.commercial)) comSet[r.commercial]=0; comSet[r.commercial]++; } });
  const comList=Object.keys(comSet).map(n=>({nom:n,count:comSet[n]})).sort((a,b)=>b.count-a.count);
  let balPct=null, balVerdict='', balCls='';
  const counts=comList.map(c=>c.count); const tot=counts.reduce((a,b)=>a+b,0);
  if(comList.length>=2 && tot>0){ const mean=tot/counts.length; const variance=counts.reduce((a,b)=>a+(b-mean)*(b-mean),0)/counts.length; const cv=mean>0?Math.sqrt(variance)/mean:0; balPct=Math.max(0,Math.min(100,Math.round((1-cv)*100))); balVerdict=balPct>=75?'Équilibrée':(balPct>=50?'Correcte':'À rééquilibrer'); balCls=balPct>=75?'ok':(balPct>=50?'warn':'bad'); }
  const dayCounts={}; records.forEach(function(r){ const d=r.d; if(d && d.outcome==='R1TMK pris' && !_vs[d.commercial] && d.context!=='VAD' && monthKeyOf(d.ts)===nowMK()){ const k=dayKey(d.ts); dayCounts[k]=(dayCounts[k]||0)+1; } });
  const todayK=dayKey(Date.now()); let bestOther=0; Object.keys(dayCounts).forEach(k=>{ if(k!==todayK && dayCounts[k]>bestOther) bestOther=dayCounts[k]; });
  const wv=document.getElementById('wallView'); if(wv) wv.setAttribute('data-state', wallDayState()); const _lt=document.getElementById('wvLiveTxt'); if(_lt) _lt.textContent=(wallIsPast()?_capMonth(monthLabel(wallViewMK)):(wallDayState()==='active'?'EN DIRECT':'RÉCAPITULATIF'));
  const c=document.getElementById('wvClock'); if(c) c.textContent=wvFmtClock();
  const dd=document.getElementById('wvDate'); if(dd) dd.textContent=wvFmtDate();
  wvEnsureStage();
  wvUpdateHero({totDone:totDone,totObj:totObj,regPct:regPct,reste:reste,rem:wd.remaining,totToday:totToday,totCalls:totCalls,cadence:cadence,totProj:totProj,upcoming:totUpcoming,honored:totHonored,nextAvance:nextAvance,projCls:projCls,vad:totVad,vadObj:totVadObj,fp:totFp,qual:quality});
  wvUpdateRing(ringCtx, totDone, regPct);
  wvUpdateDayStrip(totToday, dailyNeed);
  wvUpdateDist({list:comList,pct:balPct,verdict:balVerdict,cls:balCls}, buildComColors());
  wvSceneTraj(monthR1F, mk);
  wvUpdateHonor(data);
  renderWallTicker();
  var _pastV=wallIsPast(); var _dsEl=document.querySelector('.pw-daystrip'); if(_dsEl) _dsEl.style.display=_pastV?'none':''; var _moEl=document.getElementById('wvMo'); if(_moEl) _moEl.style.display=_pastV?'none':''; var _lvEl=document.querySelector('.wv-live'); if(_lvEl) _lvEl.classList.toggle('past', _pastV);
  if(!wvBootGate){ wvMaxPct=regPct; wvBestDay=Math.max(bestOther, totToday); wvBootGate=true; } else if(!wallIsPast()){ wvMilestoneCheck(regPct); wvRecordCheck(totToday, bestOther); }
}
function renderWallTicker(){ const list=document.getElementById('wvFeedList'); if(!list) return; const _vs=wallVadSet(); const r1=records.filter(r=>r.d && r.d.outcome==='R1TMK pris' && !_vs[r.d.commercial] && r.d.context!=='VAD').sort((a,b)=>(b.d.ts||0)-(a.d.ts||0)).slice(0,5); if(!r1.length){ list.innerHTML='<span class="pw-feed-empty">En attente des premiers rendez-vous du jour.</span>'; return; } list.innerHTML=r1.map(function(r){ const x=r.d; const who=wallNames ? ('<b>'+esc(r.agent)+'</b>'+((x.societe&&String(x.societe).indexOf('non renseign')<0)?(' · '+esc(x.societe)):'')) : 'Rendez-vous terrain'; return '<span class="pw-feed-chip"><span class="pw-fc-dot"></span>'+who+' <span class="pw-fc-ago">'+timeAgo(x.ts)+'</span></span>'; }).join(''); }
function setWvNamesLabel(){ const b=document.getElementById('wvNamesBtn'); if(b){ b.textContent=(wallNames?'Noms affichés':'Noms masqués'); b.classList.toggle('on', wallNames); b.title=(wallNames?'Reconnaissance nominative positive activée':'Mode collectif anonyme, aucun nom affiché'); } }
function toggleWallNames(){ wallNames=!wallNames; try{ localStorage.setItem('oob_mgr_wallnames', wallNames?'1':'0'); }catch(e){} setWvNamesLabel(); renderWall(); }

let sb=null, records=[], configs={}, wallData=[], wallTickIdx=0;
let wallTheme=(function(){ try{ return localStorage.getItem('oob_mgr_walltheme')||'light'; }catch(e){ return 'dark'; } })();
let wallNames=(function(){ try{ return localStorage.getItem('oob_mgr_wallnames')==='1'; }catch(e){ return false; } })();

function applyWallTheme(){ document.documentElement.setAttribute('data-theme', wallTheme); }
function setWvThemeIcon(){ const b=document.getElementById('wvThemeBtn'); if(b) b.innerHTML=(wallTheme==='dark'?ICN.sun:ICN.moon); }
function toggleWallTheme(){ wallTheme=(wallTheme==='dark'?'light':'dark'); try{ localStorage.setItem('oob_mgr_walltheme', wallTheme); }catch(e){} applyWallTheme(); setWvThemeIcon(); }

async function wallFetch(){
  const {data:cfgs}=await sb.from(CFG_TABLE).select('id,data');
  configs={}; (cfgs||[]).forEach(c=>{ if(c.id) configs[c.id]=c.data||{}; });
  const {data:recs,error}=await sb.from(REC_TABLE).select('agent,data').gte('ts',cockpitCutoff()).order('ts',{ascending:false}).limit(8000);
  if(error) throw error;
  records=(recs||[]).map(r=>({agent:r.agent, d:r.data})).filter(r=>r.d);
  buildMonthSelectMur();
  renderWall();
}
function wallSubscribe(){
  const safe=fn=>(p=>{ try{ fn(p); }catch(e){} });
  sb.channel('mur-rt')
    .on('postgres_changes',{event:'INSERT',schema:'public',table:REC_TABLE}, safe(p=>{
      if(!p.new) return; const rec={agent:p.new.agent, d:p.new.data};
      if(!rec.d || records.find(x=>x.d && x.d.id===rec.d.id)) return;
      records.unshift(rec); renderWall();
      if(rec.d.outcome==='R1TMK pris' && wvBootGate && !wallIsPast()){ try{ wvCelebrate(rec); }catch(e){} }
    }))
    .on('postgres_changes',{event:'DELETE',schema:'public',table:REC_TABLE}, safe(p=>{
      const id=p.old&&p.old.id; if(id){ records=records.filter(x=>!(x.d&&x.d.id===id)); renderWall(); }
    }))
    .on('postgres_changes',{event:'*',schema:'public',table:CFG_TABLE}, safe(p=>{ if(p.new&&p.new.id){ configs[p.new.id]=p.new.data||{}; renderWall(); } }))
    .subscribe();
}
async function wallBoot(){
  document.body.classList.add('wall');
  applyWallTheme(); setWvThemeIcon(); setWvNamesLabel();
  if(!window.supabase){ const r=document.getElementById('wvRegion'); if(r) r.innerHTML='<div class="wv-rg-main"><div class="wv-rg-num"><span class="wv-rg-of">Connexion indisponible. Vérifie internet.</span></div></div>'; return; }
  sb=window.supabase.createClient(CLOUD.url, CLOUD.anonKey, {auth:{persistSession:false, autoRefreshToken:false}, realtime:{params:{eventsPerSecond:6}}});
  try{ await wallFetch(); wallSubscribe(); setInterval(()=>{ wallFetch().catch(()=>{}); }, 45000); }
  catch(e){ console.warn(e); }
  setInterval(()=>{ wallTickIdx++; renderWallTicker(); }, 6000);
  setInterval(()=>{ const c=document.getElementById('wvClock'); if(c) c.textContent=wvFmtClock(); const d=document.getElementById('wvDate'); if(d) d.textContent=wvFmtDate(); }, 20000);
}

function buildMonthSelectMur(){ const sel=document.getElementById('wvMonthSel'); if(!sel) return; const ny=new Date().getFullYear(); const plausible=function(mk){ const y=parseInt(String(mk).slice(0,4),10); return !isNaN(y) && y>=ny-2 && y<=ny+1; }; const set=new Set([nowMK(), nextMK(nowMK())]); records.forEach(function(r){ if(r.d && r.d.ts){ var bk=monthKeyOf(r.d.ts); if(plausible(bk)) set.add(bk); if(r.d.outcome==='R1TMK pris'){ var rk=rdvMK(r.d); if(plausible(rk)) set.add(rk); } } }); const arr=[...set].filter(plausible).sort().reverse(); sel.innerHTML=arr.map(function(mk){ return '<option value="'+mk+'"'+(mk===wallViewMK?' selected':'')+'>'+_capMonth(monthLabel(mk))+'</option>'; }).join(''); }
(function(){ const ms=document.getElementById('wvMonthSel'); if(ms) ms.addEventListener('change', function(e){ wallViewMK=e.target.value; buildMonthSelectMur(); renderWall(); }); })();
document.getElementById('wvNamesBtn').addEventListener('click', toggleWallNames);
var _wsb=document.getElementById('wvSoundBtn'); if(_wsb) _wsb.addEventListener('click', toggleWvSound); setWvSoundIcon();
['click','keydown','dblclick'].forEach(function(ev){ window.addEventListener(ev, function(){ if(_wactx && _wactx.state==='suspended') _wactx.resume().catch(function(){}); }); });
document.addEventListener('dblclick', ()=>{ try{ if(!document.fullscreenElement){ document.documentElement.requestFullscreen && document.documentElement.requestFullscreen(); } else { document.exitFullscreen && document.exitFullscreen(); } }catch(e){} });
wallBoot();
